<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1_toshkenchi | Taksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <div class="bg-yellow-400 p-6 text-center shadow-lg">
        <h1 class="text-3xl font-black italic text-gray-900 uppercase tracking-tighter">
            <i class="fas fa-taxi mr-2"></i>N1_TOSHKENCHI
        </h1>
        <p class="text-[10px] font-bold text-gray-800 mt-1 tracking-widest uppercase">Tezkor va ishonchli xizmat</p>
    </div>

    <div class="flex items-center justify-center p-4 py-8">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 border-t-8 border-yellow-400">
            <form id="taxiForm" class="space-y-4">
                
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" id="userName" placeholder="Ism va Telefon" required 
                    class="w-full pl-12 p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-yellow-400 transition-all">
                </div>

                <div class="relative">
                    <i class="fas fa-map-marked-alt absolute left-4 top-4 text-gray-400"></i>
                    <input type="text" id="userDest" placeholder="Qayerga borasiz?" required 
                    class="w-full pl-12 p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-yellow-400 transition-all">
                </div>

                <select id="userTarif" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-semibold text-gray-700">
                    <option value="Ekonom">🚕 Ekonom (Arzon)</option>
                    <option value="Komfort" selected>✨ Komfort (Yaxshi)</option>
                    <option value="Biznes">👑 Biznes (VIP)</option>
                </select>

                <div class="p-4 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-200 text-center">
                    <button type="button" onclick="getLocation()" id="locBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold active:scale-95 transition">
                        📍 LOKATSIYANI ANIQLASH
                    </button>
                    <p id="locStatus" class="text-[10px] mt-2 text-blue-400 font-bold uppercase italic">Manzil aniqlanmagan</p>
                </div>

                <textarea id="userMsg" placeholder="Qo'shimcha izoh (masalan: 2 kishi, yuk bor)" 
                class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl h-24 outline-none focus:border-yellow-400"></textarea>

                <button type="submit" id="submitBtn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-black py-5 rounded-2xl text-xl shadow-xl active:scale-95 transition-all uppercase">
                    Buyurtma Berish
                </button>
            </form>
        </div>
    </div>

    <script>
        let gpsLink = "Lokatsiya yuborilmadi";

        function getLocation() {
            const btn = document.getElementById('locBtn');
            const status = document.getElementById('locStatus');
            if (navigator.geolocation) {
                btn.innerText = "QIDIRILMOQDA...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    gpsLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    status.innerText = "Lokatsiya aniqlandi ✅";
                    status.className = "text-[10px] mt-2 text-green-600 font-bold uppercase";
                    btn.innerText = "TAYYOR";
                    btn.className = "bg-green-600 text-white px-6 py-2 rounded-xl text-xs font-bold";
                }, () => {
                    status.innerText = "Ruxsat berilmadi ❌";
                });
            }
        }

        // --- MA'LUMOTLARINGIZ ---
        const BOT_TOKEN = "8324207975:AAHZh6npIMCM6P5eYinTjTOkjdf921WGWw4";
        const ADMIN_ID = "8514630685";

        document.getElementById('taxiForm').onsubmit = async (e) => {
            e.preventDefault();
            const sBtn = document.getElementById('submitBtn');
            sBtn.innerText = "YUBORILMOQDA...";
            sBtn.disabled = true;

            const name = document.getElementById('userName').value;
            const dest = document.getElementById('userDest').value;
            const tarif = document.getElementById('userTarif').value;
            const msg = document.getElementById('userMsg').value || "Yo'q";

            const fullText = `🚖 *N1_TOSHKENCHI - YANGI BUYURTMA*\n\n` +
                             `👤 *Mijoz:* ${name}\n` +
                             `📍 *Manzil:* ${dest}\n` +
                             `🚕 *Tarif:* ${tarif}\n` +
                             `💬 *Izoh:* ${msg}\n\n` +
                             `📍 *Lokatsiya (Xarita):* ${gpsLink}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: fullText,
                        parse_mode: "Markdown"
                    })
                });

                if (response.ok) {
                    alert("✅ Buyurtma qabul qilindi! Tez orada bog'lanamiz.");
                    location.reload();
                } else {
                    alert("⚠️ Botda xatolik! Iltimos, botga kirib START tugmasini bosing.");
                    sBtn.disabled = false;
                    sBtn.innerText = "Buyurtma Berish";
                }
            } catch (err) {
                alert("❌ Internet ulanishini tekshiring!");
                sBtn.disabled = false;
                sBtn.innerText = "Buyurtma Berish";
            }
        };
    </script>
</body>
    </html>
