<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N1_toshkenchi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">

    <div class="bg-yellow-400 p-6 text-center shadow-md">
        <h1 class="text-3xl font-black italic">N1_TOSHKENCHI</h1>
    </div>

    <div class="max-w-md mx-auto m-6 p-8 bg-white rounded-[2rem] shadow-xl border-t-4 border-yellow-400">
        <form id="taxiOrder" class="space-y-5">
            <input type="text" id="name" placeholder="Ism va Telefon" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-yellow-400">
            <input type="text" id="where" placeholder="Qayerga borasiz?" required class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-yellow-400">
            
            <select id="type" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <option>Ekonom</option>
                <option>Komfort</option>
                <option>Biznes</option>
            </select>

            <button type="button" onclick="getLoc()" id="lBtn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase tracking-wider">
               <i class="fas fa-location-arrow"></i> Lokatsiyani Aniqlash
            </button>
            <p id="lStatus" class="text-center text-[10px] text-gray-400 italic">Lokatsiya kiritilmagan</p>

            <textarea id="note" placeholder="Qo'shimcha izoh..." class="w-full p-4 bg-gray-50 border rounded-2xl h-24 outline-none focus:ring-2 focus:ring-yellow-400"></textarea>

            <button type="submit" class="w-full py-5 bg-yellow-400 text-black font-black rounded-2xl text-xl shadow-lg active:scale-95 transition">
                BUYURTMA BERISH
            </button>
        </form>
    </div>

    <script>
        let myLoc = "Lokatsiya berilmadi";

        function getLoc() {
            const btn = document.getElementById('lBtn');
            const st = document.getElementById('lStatus');
            if (navigator.geolocation) {
                btn.innerText = "Qidirilmoqda...";
                navigator.geolocation.getCurrentPosition((p) => {
                    myLoc = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    st.innerText = "Lokatsiya tayyor ✅";
                    st.className = "text-center text-[10px] text-green-600 font-bold";
                    btn.innerText = "LOKATSIYA OLINDI";
                    btn.style.backgroundColor = "#16a34a";
                }, () => {
                    st.innerText = "Ruxsat berilmadi ❌";
                });
            }
        }

        // MA'LUMOTLARINGIZ
        const B_TOKEN = "8324207975:AAHZh6npIMCM6P5eYinTjTOkjdf921WGWw4";
        const C_ID = "8514630685";

        document.getElementById('taxiOrder').onsubmit = async (e) => {
            e.preventDefault();
            
            const n = document.getElementById('name').value;
            const w = document.getElementById('where').value;
            const t = document.getElementById('type').value;
            const m = document.getElementById('note').value || "Yo'q";

            const msg = `🚖 **N1_TOSHKENCHI - YANGI BUYURTMA**\n\n👤 **Mijoz:** ${n}\n📍 **Manzil:** ${w}\n🚕 **Tarif:** ${t}\n💬 **Izoh:** ${m}\n\n🗺 **Xarita:** ${myLoc}`;

            try {
                const r = await fetch(`https://api.telegram.org/bot${B_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: C_ID, text: msg, parse_mode: "Markdown" })
                });

                if (r.ok) {
                    alert("✅ Buyurtma yuborildi! Tez orada bog'lanamiz.");
                    location.reload();
                } else {
                    alert("❌ Botda xatolik! Token yoki Chat ID noto'g'ri.");
                }
            } catch (err) {
                alert("❌ Internet ulanmagan!");
            }
        };
    </script>
</body>
</html>
